<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f5a623">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TallerOS">
  <link rel="apple-touch-icon" href="/logo-igsm.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TallerOS — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0e;--bg2:#0f1218;--bg3:#161b24;--border:#1f2735;--text:#e2e8f4;--muted:#5a6880;--muted2:#8a9ab5;--accent:#00d4ff;--green:#00e676;--red:#ff3d5a;--font:"Outfit",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:440px;padding:20px}
.logo{font-size:36px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),#bf6bff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px}
.sub{text-align:center;color:var(--muted2);font-size:13px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px}
.title{font-size:15px;font-weight:800;margin-bottom:16px}
.lbl{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block}
.inp{width:100%;background:var(--bg3);border:1.5px solid var(--border);color:var(--text);padding:11px 14px;border-radius:9px;font-family:var(--font);font-size:14px;outline:none;margin-bottom:14px;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.btn{width:100%;padding:13px;border-radius:9px;border:none;cursor:pointer;font-family:var(--font);font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--accent),#0099cc);color:#000;margin-top:4px}
.btn:disabled{opacity:.6;cursor:not-allowed}
.err{background:rgba(255,61,90,.1);border:1px solid rgba(255,61,90,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:14px;display:none}
.err.show{display:block}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.ucard{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;text-align:center}
.ucard:hover{border-color:var(--accent);transform:translateY(-2px)}
.ucard.sel{border-color:var(--accent);background:rgba(0,212,255,.06)}
.uav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;margin:0 auto 7px}
.uname{font-size:12px;font-weight:700}
.urole{font-size:10px;color:var(--muted2)}
.div{text-align:center;color:var(--muted);font-size:11px;margin:14px 0;position:relative}
.div::before,.div::after{content:"";position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.div::before{left:0}.div::after{right:0}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script>
// Detectar si estamos en Railway o local
if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
  window.API_BASE_URL = '';  // Misma URL base - Railway sirve API y frontend juntos
} else {
  window.API_BASE_URL = 'http://localhost:3003';
}
</script>
</head>
<body>
<div class="wrap">
  <div class="logo" id="topbar-logo"><span style="color:#ff3d5a">i</span><span style="color:#00d4ff">GSM</span><span style="color:#ff3d5a">.</span></div>
  <div class="sub">Sistema de gestion de taller</div>
  <div class="card">
    <div class="title">👋 Selecciona tu usuario</div>
    <div class="grid" id="ugrid">
      <div style="grid-column:1/-1;text-align:center;color:var(--muted2);padding:16px;font-size:12px">Cargando...</div>
    </div>
    <div class="div">o introduce tus credenciales</div>
    <div id="err" class="err"></div>
    <label class="lbl">Email</label>
    <input class="inp" id="email" type="email" placeholder="admin@talleros.es" autocomplete="username">
    <label class="lbl">Contraseña</label>
    <input class="inp" id="pass" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" id="btnlogin" onclick="doLogin()">Entrar</button>
  </div>
</div>
<script>
var API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? "http://localhost:3003/api"
  : "/api";

document.getElementById("pass").addEventListener("keydown", function(e){
  if(e.key==="Enter") doLogin();
});

function cargar() {
  fetch(API + "/auth/usuarios-publicos")
    .then(function(r){ return r.json(); })
    .then(function(lista) {
      var grid = document.getElementById("ugrid");
      if(!Array.isArray(lista)||!lista.length){
        grid.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--muted2);padding:16px;font-size:12px">Introduce tus credenciales abajo</div>';
        return;
      }
      var roles={admin:"Admin",tecnico:"Tecnico",recepcion:"Recepcion"};
      grid.innerHTML = lista.map(function(u){
        var c=u.color||"#4a9eff";
        var i=u.iniciales||u.nombre.charAt(0);
        return '<div class="ucard" id="u'+u.id+'" onclick="sel('+u.id+',\''+u.email+'\',\''+u.nombre+'\',\''+i+'\',\''+c+'\',\''+u.rol+'\')">' +
          '<div class="uav" style="background:'+c+'22;color:'+c+'">'+i+'</div>' +
          '<div class="uname">'+u.nombre.split(" ")[0]+'</div>' +
          '<div class="urole">'+(roles[u.rol]||u.rol)+'</div></div>';
      }).join("");
    })
    .catch(function(){
      document.getElementById("ugrid").innerHTML=
        '<div style="grid-column:1/-1;text-align:center;color:var(--muted2);padding:16px;font-size:12px">Introduce tus credenciales abajo</div>';
    });
}

function sel(id,email,nombre,ini,color,rol){
  document.querySelectorAll(".ucard").forEach(function(c){c.classList.remove("sel");});
  var el=document.getElementById("u"+id);
  if(el) el.classList.add("sel");
  document.getElementById("email").value=email||"";
  document.getElementById("pass").focus();
}

function doLogin(){
  var email=document.getElementById("email").value.trim();
  var pass=document.getElementById("pass").value;
  var err=document.getElementById("err");
  err.classList.remove("show");
  if(!email||!pass){err.textContent="Introduce email y contraseña";err.classList.add("show");return;}
  var btn=document.getElementById("btnlogin");
  btn.innerHTML='<span class="spinner"></span>Verificando...';
  btn.disabled=true;
  fetch(API+"/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email,password:pass})
  })
  .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});})
  .then(function(res){
    btn.innerHTML="Entrar";btn.disabled=false;
    if(res.ok&&res.d.token){
      localStorage.setItem("talleros_token",res.d.token);
      localStorage.setItem("talleros_user",JSON.stringify(res.d.usuario));
      btn.innerHTML="✓ Accediendo...";
      setTimeout(function(){window.location.href="ordenes-reparacion.html";},600);
    } else {
      err.textContent=res.d.error||"Credenciales incorrectas";
      err.classList.add("show");
      document.getElementById("pass").value="";
    }
  })
  .catch(function(){
    btn.innerHTML="Entrar";btn.disabled=false;
    err.textContent="No se puede conectar al servidor";
    err.classList.add("show");
  });
}

cargar();
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(reg){ reg.unregister(); });
  });
  caches.keys().then(function(keys){
    keys.forEach(function(k){ caches.delete(k); });
  });
}
</script>
</body>
</html>
