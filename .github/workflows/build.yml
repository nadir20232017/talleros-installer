name: Build TallerOS Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install NSIS
      run: |
        choco install nsis -y
        echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Create directories
      run: |
        New-Item -ItemType Directory -Force -Path "installers"

    - name: Download Node.js
      run: |
        Write-Host "Descargando Node.js..."
        $nodeUrl = "https://nodejs.org/dist/v25.8.2/node-v25.8.2-x64.msi"
        Invoke-WebRequest -Uri $nodeUrl -OutFile "installers\node-v25.8.2-x64.msi" -MaximumRetryCount 3
        if (!(Test-Path "installers\node-v25.8.2-x64.msi")) {
          Write-Error "Error descargando Node.js"
          exit 1
        }
        Write-Host "Node.js descargado correctamente"

    - name: Download PostgreSQL
      run: |
        Write-Host "Descargando PostgreSQL..."
        $pgUrl = "https://get.enterprisedb.com/postgresql/postgresql-18.0-rc1-windows-x64.exe"
        Invoke-WebRequest -Uri $pgUrl -OutFile "installers\postgresql-18.0-rc1-windows-x64.exe" -MaximumRetryCount 3
        if (!(Test-Path "installers\postgresql-18.0-rc1-windows-x64.exe")) {
          Write-Error "Error descargando PostgreSQL"
          exit 1
        }
        Write-Host "PostgreSQL descargado correctamente"

    - name: Verify TallerOS files
      run: |
        Write-Host "=== Verificando archivos de TallerOS ==="
        if (!(Test-Path "files-win-licencia-pro\package.json")) {
          Write-Error "TallerOS no encontrado en files-win-licencia-pro/"
          exit 1
        }
        Write-Host "TallerOS encontrado correctamente"

    - name: Verify all files
      run: |
        Write-Host "=== Archivos encontrados ==="
        Get-ChildItem -Recurse | Select-Object FullName, Length | Format-Table -AutoSize

        if (!(Test-Path "installers\node-v25.8.2-x64.msi")) {
          Write-Error "Node.js no encontrado"
          exit 1
        }

        if (!(Test-Path "installers\postgresql-18.0-rc1-windows-x64.exe")) {
          Write-Error "PostgreSQL no encontrado"
          exit 1
        }

        if (!(Test-Path "files-win-licencia-pro\package.json")) {
          Write-Error "TallerOS no encontrado"
          exit 1
        }

        Write-Host "=== Todos los archivos OK ==="

    - name: Build Installer
      run: |
        & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Fallo la compilacion"
          exit 1
        }

    - name: Verify output
      run: |
        if (Test-Path "TallerOS-Setup.exe") {
          Write-Host "=== Instalador creado exitosamente ==="
          Get-Item "TallerOS-Setup.exe" | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Error "No se encontro el instalador"
          exit 1
        }

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: TallerOS-Installer
        path: TallerOS-Setup.exe
        retention-days: 30

    - name: Create Release
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: TallerOS-Setup.exe
        draft: false
        prerelease: false
        name: "TallerOS v2.0"
        body: |
          Instalador completo de TallerOS v2.0

          Incluye:
          - Node.js 18
          - PostgreSQL 15
          - TallerOS completo

          Datos de acceso:
          - Usuario: admin@igsm.com
          - Contraseña: admin123
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
