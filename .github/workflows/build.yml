name: Build TallerOS Licensed

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Prepare package
      run: |
        echo "=== Preparando paquete TallerOS Licensed ==="
        cd talleros-standalone

        # Crear estructura limpia
        mkdir -p ../talleros-licensed-package

        # Copiar archivos principales (sin node.exe grande)
        cp -r backend frontend src resources build package.json package-lock.json README-LICENSED.txt ../talleros-licensed-package/

        # Copiar scripts de instalacion
        cp Instalar-TallerOS-Licensed.bat ../talleros-licensed-package/
        cp Iniciar-TallerOS-Electron.bat ../talleros-licensed-package/

        # Crear ZIP
        cd ..
        zip -r TallerOS-Licensed-v2.0-Windows.zip talleros-licensed-package/

        echo "=== Paquete creado ==="
        ls -lh TallerOS-Licensed-v2.0-Windows.zip

    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: TallerOS-Licensed-v2.0-Windows
        path: TallerOS-Licensed-v2.0-Windows.zip
        retention-days: 30

    - name: Create Release (on tag)
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: TallerOS-Licensed-v2.0-Windows.zip
        draft: false
        prerelease: false
        name: "TallerOS Licensed v2.0"
        body: |
          Paquete completo de TallerOS Licensed v2.0 para Windows

          INCLUYE:
          - TallerOS v2.0 completo
          - Electron (app de escritorio)
          - Sistema de activacion de licencias
          - Instalador automatico (.bat)

          REQUISITOS:
          - Windows 10/11 (64 bits)
          - 2 GB espacio libre
          - Conexion a internet (primera vez)

          INSTALACION:
          1. Descomprime el ZIP
          2. Ejecuta "Instalar-TallerOS-Licensed.bat" como admin
          3. Espera 5-10 minutos
          4. Inicia desde el escritorio

          ACTIVACION:
          La primera vez se abrira la ventana de activacion.
          Visita https://igsm.es/talleros para obtener licencia.

          SOPORTE: soporte@igsm.es
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
