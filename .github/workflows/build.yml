name: Build TallerOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    name: Build Windows Package

    steps:
    - uses: actions/checkout@v4

    - name: Prepare Windows Package
      run: |
        echo "=== Preparando paquete Windows ==="
        cd talleros-standalone

        # Crear estructura limpia
        mkdir -p ../talleros-windows-package

        # Copiar archivos principales
        cp -r backend frontend src resources build package.json package-lock.json \
          INSTRUCCIONES-INSTALACION.txt GENERAR-LICENCIAS.html ../talleros-windows-package/

        # Copiar scripts de instalacion
        cp INSTALAR-UNLOCKED.bat INICIAR-UNLOCKED.bat ../talleros-windows-package/

        # Crear ZIP
        cd ..
        zip -r TallerOS-v2.0-Windows.zip talleros-windows-package/

        echo "=== Paquete Windows creado ==="
        ls -lh TallerOS-v2.0-Windows.zip

    - name: Upload Windows Package
      uses: actions/upload-artifact@v4
      with:
        name: TallerOS-v2.0-Windows
        path: TallerOS-v2.0-Windows.zip
        retention-days: 30

  build-mac:
    runs-on: macos-latest
    name: Build macOS DMG

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        cd talleros-standalone
        npm install

    - name: Build macOS DMG
      run: |
        cd talleros-standalone
        npm run build-mac

    - name: Find DMG file
      run: |
        echo "=== Buscando archivo DMG ==="
        find talleros-standalone/dist -name "*.dmg" -type f
        ls -lh talleros-standalone/dist/ || echo "No hay carpeta dist"

    - name: Upload macOS DMG
      uses: actions/upload-artifact@v4
      with:
        name: TallerOS-v2.0-macOS
        path: talleros-standalone/dist/*.dmg
        retention-days: 30
        if-no-files-found: warn

    - name: Create Release (on tag)
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          TallerOS-v2.0-Windows.zip
          talleros-standalone/dist/*.dmg
        draft: false
        prerelease: false
        name: "TallerOS v2.0"
        body: |
          Paquetes completos de TallerOS v2.0

          ## Windows
          - Descomprime el ZIP
          - Ejecuta INSTALAR-UNLOCKED.bat como admin
          - Incluye generador de licencias

          ## macOS
          - Descarga el DMG
          - Arrastra TallerOS a Applications
          - Version para admin (sin restricciones)

          ## Datos de acceso
          - Usuario: admin@igsm.com
          - Contraseña: admin123

          Soporte: soporte@igsm.es
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
