name: Build TallerOS Standalone

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Verify TallerOS files
      run: |
        echo "=== Verificando archivos de TallerOS ==="
        if [ ! -f "talleros-standalone/package.json" ]; then
          echo "Error: TallerOS no encontrado en talleros-standalone/"
          exit 1
        fi
        echo "OK: TallerOS encontrado"

        if [ ! -f "talleros-standalone/Instalar-TallerOS.bat" ]; then
          echo "Error: Instalador no encontrado"
          exit 1
        fi
        echo "OK: Instalador encontrado"

    - name: Create ZIP package
      run: |
        echo "=== Creando paquete ZIP ==="
        cd talleros-standalone
        zip -r ../TallerOS-v2.0-Standalone.zip .
        cd ..
        echo "=== Paquete creado ==="
        ls -lh TallerOS-v2.0-Standalone.zip

    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: TallerOS-v2.0-Standalone
        path: TallerOS-v2.0-Standalone.zip
        retention-days: 30

    - name: Create Release (on tag)
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: TallerOS-v2.0-Standalone.zip
        draft: false
        prerelease: false
        name: "TallerOS v2.0 Standalone"
        body: |
          Paquete standalone de TallerOS v2.0

          Incluye:
          - TallerOS completo
          - Script de instalacion automatica
          - Instaladores de Node.js y PostgreSQL (se descargan automaticamente)

          INSTRUCCIONES:
          1. Descarga el ZIP
          2. Descomprime en cualquier carpeta
          3. Ejecuta "Instalar-TallerOS.bat" como administrador
          4. El instalador descargara e instalara todo automaticamente

          Datos de acceso:
          - Usuario: admin@igsm.com
          - Contraseña: admin123
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
